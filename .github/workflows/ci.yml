name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Test CLI hello
        run: python translator.py examples/hello.amh

      - name: Test CLI control_flow
        run: python translator.py examples/control_flow.amh

      - name: Test CLI classes
        run: python translator.py examples/classes.amh

      - name: List available langs
        run: python translator.py --list-langs

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install ruff
      - run: ruff check . --exclude venv --exclude .venv --exclude website --exclude vscode-extension || true
